server {
    listen 80;
    server_name YOUR_VPS_IP_HERE;

    root /home/ubuntu/hermeswork/frontend;
    index landing.html;

    location / {
        try_files $uri $uri/ /landing.html;
    }

    location /dashboard {
        try_files /index.html =404;
    }

    location /api/ {
        proxy_pass http://localhost:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header 'Access-Control-Allow-Origin' '*';
    }

    location /pay/ { proxy_pass http://localhost:3500; proxy_set_header Host $host; }
    location /invoice/ { proxy_pass http://localhost:3500; proxy_set_header Host $host; }
    location /webhooks/ { proxy_pass http://localhost:3500; proxy_set_header Host $host; }
    location /demo/ { proxy_pass http://localhost:3500; proxy_set_header Host $host; }
    location /health { proxy_pass http://localhost:3500; }
}
