# HermesWork v12 — Render Blueprint (Python backend + static frontend)
# Apply with: Render Dashboard → New → Blueprint → connect this repo
services:
  # ── Python FastAPI backend ──────────────────────────────────────────────
  - type: web
    name: hermeswork
    runtime: python
    rootDir: backend-python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        value: https://hermeswork.onrender.com
      - key: HERMESWORK_API_KEY
        generateValue: true
      - key: ENABLE_DEMO_SEED
        value: "false"
      # Set these in the Render dashboard (do NOT commit secrets):
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  # ── Static frontend ─────────────────────────────────────────────────────
  - type: web
    name: hermeswork-frontend
    runtime: static
    rootDir: .
    plan: free
    staticPublishPath: .
    buildCommand: ""
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /frontend/index.html
